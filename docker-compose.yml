networks:
  web:
    external: true
  internal:
    external: false

services:
  madsnorgaard_drupal_db:
    image: mariadb:11
    container_name: madsnorgaard_drupal_db
    command: --transaction-isolation=READ-COMMITTED
    env_file:
    - .env
    restart: always
    environment:
      MYSQL_DATABASE: "${DB_NAME}"
      MYSQL_USER: "${DB_USER}"
      MYSQL_PASSWORD: "${DB_PASS}"
      MYSQL_RANDOM_ROOT_PASSWORD: "1"
    volumes:
      - ./data/mysql:/var/lib/mysql
    labels:
      - "traefik.enable=false" # Disable Traefik for this service
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u \"$$MYSQL_USER\" -p\"$$MYSQL_PASSWORD\" --silent"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s


  drupal:
    container_name: madsnorgaard_drupal
    env_file:
    - .env
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: always
    ports:
      - 9998:80
    working_dir: /opt/drupal
    volumes:
      - ./backups:/opt/drupal/backups
      - ./composer.json:/opt/drupal/composer.json
      - ./composer.lock:/opt/drupal/composer.lock
      - ./settings.php:/opt/drupal/web/sites/default/settings.php
      - ./config:/opt/drupal/config
      - ./recipes:/opt/drupal/recipes
      - ./web/modules/custom:/opt/drupal/web/modules/custom
      - ./web/sites/default/files:/opt/drupal/web/sites/default/files
    environment:
      COMPOSER_MEMORY_LIMIT: "2G"
      WEBROOT_SITE: ${WEBROOT_SITE}
      DOMAIN: ${DOMAIN_NAME}
      TRUSTED_HOST_PATTERNS: ${TRUSTED_HOST_PATTERNS}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: 3306
      HASH_SALT: ${HASH_SALT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: 6379
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.madsnorgaard_drupal.rule=Host(`drupal.madsnorgaard.net`)"
      - "traefik.http.routers.madsnorgaard_drupal.tls.certresolver=lets-encrypt"
      - "traefik.http.services.madsnorgaard_drupal.loadbalancer.server.port=80"
      # Per-service CSP — Drupal admin needs unsafe-inline/unsafe-eval for CKEditor
      - "traefik.http.middlewares.drupal-csp.headers.contentSecurityPolicy=default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; upgrade-insecure-requests"
      # Strip Drupal-specific fingerprinting headers
      - "traefik.http.middlewares.drupal-csp.headers.customResponseHeaders.X-Drupal-Cache="
      - "traefik.http.middlewares.drupal-csp.headers.customResponseHeaders.X-Drupal-Dynamic-Cache="
      - "traefik.http.routers.madsnorgaard_drupal.middlewares=drupal-csp"
    networks:
      - internal
      - web
    depends_on:
      madsnorgaard_drupal_db:
        condition: service_healthy
      madsnorgaard_redis:
        condition: service_healthy

  madsnorgaard_redis:
    image: library/redis:latest
    container_name: madsnorgaard_redis
    volumes:
      - ./data/redis:/data
    command: ["redis-server"]
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 20s
      retries: 10
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"

  madsnorgaard_solr:
    # Upgraded 8.11.2 -> 9.10.1 as part of the AI content engine epic (#13).
    # Solr 9.6+ is required by search_api_solr_dense_vector. The old
    # ./data/solr volume on VPS2 has an 8.x core that was never wired to
    # search_api, so there's no data to migrate — the new data path
    # ./data/solr9 is used so the old dir can be kept as a rollback
    # breadcrumb and deleted by hand later.
    image: solr:9.10.1
    container_name: madsnorgaard_solr
    restart: unless-stopped
    command:
      - solr-precreate
      - drupal
      - /opt/solr/server/solr/configsets/drupal
    environment:
      SOLR_HEAP: "512m"
      # Solr 9 splits previously-bundled contrib libraries into optional
      # modules. search_api_solr's jump-start schema references
      # ICUCollationField from analysis-extras for language-aware sorting,
      # so that module has to be loaded explicitly at startup.
      SOLR_MODULES: "analysis-extras"
    volumes:
      - ./data/solr9:/var/solr
      - ./solr/drupal:/opt/solr/server/solr/configsets/drupal:ro
    # Bound to localhost only: SSH-tunnel to reach the admin UI
    # (ssh -L 8983:127.0.0.1:8983 vps2), never exposed to the internet.
    ports:
      - "127.0.0.1:8983:8983"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8983/solr/drupal/admin/ping?wt=json >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"

  madsnorgaard_ollama:
    # Local LLM runtime for drupal/ai. Internal network only — never exposed
    # to Traefik/internet. Serves nomic-embed-text for semantic search
    # embeddings; generation is offloaded to hosted Anthropic via ai module.
    image: ollama/ollama:latest
    container_name: madsnorgaard_ollama
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/app/ollama-entrypoint.sh"]
    volumes:
      - ./data/ollama:/root/.ollama
      - ./docker/ollama-entrypoint.sh:/app/ollama-entrypoint.sh:ro
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_KEEP_ALIVE: "24h"
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 3G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
