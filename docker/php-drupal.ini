; Custom PHP settings layered on top of the drupal:11-php8.4-apache base.
; Drush config import and search_api Solr config generation both need more
; than the stock 128 MB (observed OOM during cim with ~40 Kb of new config).
memory_limit = 512M

; File upload headroom for media + image fields. Keep in sync with Drupal's
; file_validate_size() limits.
upload_max_filesize = 64M
post_max_size = 64M

; Give long-running requests (cron, drush cim, AI provider calls) some air.
max_execution_time = 180

; realpath cache helps Drupal's include-heavy bootstrap on a large vendor/.
realpath_cache_size = 4096K
realpath_cache_ttl = 600
