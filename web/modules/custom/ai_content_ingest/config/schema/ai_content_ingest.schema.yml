ai_content_ingest.settings:
  type: config_object
  label: 'AI Content Ingest settings'
  mapping:
    target_bundle:
      type: string
      label: 'Target content type for AI-drafted content'
      constraints:
        NotBlank: []
    target_body_field:
      type: string
      label: 'Target body field machine name'
      constraints:
        NotBlank: []
    default_moderation_state:
      type: string
      label: 'Default moderation state for AI drafts'
    max_drafts_per_run:
      type: integer
      label: 'Maximum drafts created per cron run'
      constraints:
        Range:
          min: 1
          max: 100
    github_repos:
      type: sequence
      label: 'GitHub repositories to poll'
      sequence:
        type: string
        label: 'Repository slug (owner/repo)'
    github_poll_interval_seconds:
      type: integer
      label: 'Minimum seconds between GitHub polls per repo'
    github_event_types:
      type: sequence
      label: 'GitHub event types to ingest'
      sequence:
        type: string
        label: 'Event type'
